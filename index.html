const quizContainer = document.getElementById("quiz");

quizData.forEach((item, index) => {
let div = document.createElement("div");
div.classList.add("question");

let html = `<p>${item.q}</p>`;

item.options.forEach((opt, i) => {
html += `<label class="option">
<input type="radio" name="q${index}" onclick="checkAnswer(${index},${i})"> ${opt}
</label>`;
});

html += `<p id="result${index}"></p>`;

div.innerHTML = html;
quizContainer.appendChild(div);
});

function checkAnswer(qIndex, selected) {
let correct = quizData[qIndex].answer;
let result = document.getElementById("result"+qIndex);

if(selected === correct){
result.innerHTML = "✅ Correct";
result.className = "correct";
} else {
result.innerHTML = "❌ Wrong. Correct Answer: " + quizData[qIndex].options[correct];
result.className = "wrong";
}
}
